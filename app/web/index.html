<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>影像档案室</title>
  <style>
    :root{--ink:#1d2926;--paper:#f5f1e8;--line:#c5c1b6;--moss:#28604d;--sun:#e6673b;--cream:#fffdf7;--muted:#69736d;--gold:#edbd62}*{box-sizing:border-box}body{margin:0;background:linear-gradient(115deg,#ece7da,#f8f5ed 55%,#e6eee8);color:var(--ink);font:15px/1.5 "Avenir Next","PingFang SC",sans-serif}body:before{content:"";position:fixed;inset:0;opacity:.14;pointer-events:none;background-image:radial-gradient(#315047 .65px,transparent .7px);background-size:7px 7px}header{position:relative;padding:30px max(24px,calc((100vw - 1280px)/2));display:flex;justify-content:space-between;align-items:end;border-bottom:1px solid var(--line)}.eyebrow{color:var(--moss);font-size:11px;font-weight:800;letter-spacing:.16em}.clock{font:12px monospace;color:var(--muted)}h1{font:clamp(38px,5vw,66px)/.88 "Iowan Old Style","Palatino Linotype",serif;letter-spacing:-.07em;margin:5px 0 0}main{position:relative;max-width:1280px;margin:auto;padding:24px;display:grid;grid-template-columns:minmax(0,1fr) 360px;gap:24px}.panel{background:rgba(255,255,252,.76);border:1px solid var(--line);box-shadow:5px 6px 0 rgba(48,71,61,.08)}.panel h2{margin:0;padding:15px 18px;border-bottom:1px solid var(--line);font:700 17px "Iowan Old Style",serif}.mission{grid-column:1/-1;background:var(--ink);color:#f6f1e6;padding:20px 22px;display:grid;grid-template-columns:1fr auto;gap:20px;border-left:5px solid var(--sun);box-shadow:5px 6px 0 rgba(48,71,61,.18)}.mission.empty{border-left-color:var(--moss)}.mission b{font:700 19px "Iowan Old Style",serif}.mission small{color:#b7c5bd}.progress{height:8px;background:#42544d;margin:12px 0 6px;overflow:hidden}.progress i{display:block;height:100%;background:linear-gradient(90deg,var(--gold),var(--sun));transition:width .35s}.metric{text-align:right;font:700 34px/1 "Iowan Old Style",serif}.metric small{display:block;font:11px monospace;color:#c6d3ca}.dates{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:1px;background:var(--line)}button{font:inherit}.date{padding:15px;border:0;background:var(--paper);text-align:left;cursor:pointer;transition:.16s}.date:hover,.date.active{background:#dceade;transform:translate(-2px,-2px);box-shadow:3px 3px 0 var(--moss)}.date strong{display:block;font:600 17px "Iowan Old Style",serif}.date small{color:var(--muted)}.details{min-height:320px;padding:18px}.empty{color:var(--muted);padding:45px;text-align:center}.event{display:grid;grid-template-columns:112px 1fr;gap:12px;padding:10px 0;border-bottom:1px dashed var(--line)}.event img{width:112px;height:68px;object-fit:cover;background:#d8d5ca}video{width:100%;max-height:360px;background:#17231f;margin:8px 0}.form{padding:18px;display:grid;gap:12px}label{display:grid;gap:5px;color:var(--muted);font-size:12px;font-weight:700}select,input{padding:10px;border:1px solid var(--line);background:white;color:var(--ink)}.actions{display:grid;grid-template-columns:1fr 1fr;gap:8px}.action{border:0;padding:12px;color:white;background:var(--moss);font-weight:800;cursor:pointer}.action.export{background:var(--sun)}button:disabled{opacity:.45;cursor:not-allowed}.notice{margin:0 18px 18px;color:var(--sun);font-size:12px}.tasks{padding:8px 18px 18px;max-height:390px;overflow:auto}.task{padding:12px 0;border-bottom:1px dashed var(--line)}.task b{font-size:13px}.tag{padding:2px 6px;border-radius:99px;font-size:10px;background:#e6e6df}.tag.running{background:#f7d49d}.tag.completed{background:#b6d9be}.tag.failed,.tag.cancelled,.tag.interrupted{background:#f2b6a5}.cancel{float:right;border:1px solid var(--sun);color:var(--sun);background:transparent;padding:3px 7px;cursor:pointer;font-size:11px}.mini{display:flex;justify-content:space-between;gap:8px;font:11px monospace;color:var(--muted);margin-top:6px}@media(max-width:800px){main{grid-template-columns:1fr}.mission{grid-template-columns:1fr}.metric{text-align:left}header{align-items:start;flex-direction:column;gap:12px}}
  </style>
</head>
<body>
  <header><div><div class="eyebrow">PRIVATE ARCHIVE · LOCAL NETWORK ONLY</div><h1>影像档案室</h1></div><div class="clock" id="clock"></div></header>
  <main>
    <section id="mission" class="mission empty"><div><b>等待你的第一项指令</b><div class="progress"><i style="width:0%"></i></div><small>选择日期并开始扫描，系统会显示实时进度和预计剩余时间。</small></div><div class="metric">—<small>NO ACTIVE TASK</small></div></section>
    <section class="panel"><h2>日期索引 <small id="dateCount"></small></h2><div class="dates" id="dates"></div><div class="details" id="details"><div class="empty">正在读取录像日期索引…</div></div></section>
    <aside>
      <section class="panel"><h2>新建任务</h2><div class="form"><label>开始日期<input id="dateSelect" type="date"></label><label>结束日期（延时可选）<input id="endDate" type="date"></label><label>摄像头<select id="cameraSelect"><option value="0">0 路</option><option value="10">10 路</option><option value="legacy">历史录像（无摄像头编号）</option></select></label><label>性能档位<select id="profile"><option value="turbo" selected>极速（Z2 推荐）· 30 秒抽帧 · 320px</option><option value="balanced">平衡 · 10 秒抽帧 · 416px</option><option value="precise">精细 · 5 秒抽帧 · 640px</option></select></label><div class="actions"><button class="action" id="scan">扫描人物</button><button class="action export" id="export">制作延时</button></div></div><p class="notice" id="notice">扫描可直接入队；延时支持已扫描的起止日期范围。</p></section>
      <section class="panel"><h2>任务队列</h2><div class="tasks" id="tasks"></div></section>
    </aside>
  </main>
  <script>
    let overview={dates:[],tasks:[],profiles:{},diagnostics:{}},selected='';const $=s=>document.querySelector(s),fmt=d=>`${d.slice(0,4)}.${d.slice(4,6)}.${d.slice(6)}`,inputDate=d=>`${d.slice(0,4)}-${d.slice(4,6)}-${d.slice(6)}`;
    const time=s=>s==null?'计算中':s<60?`${Math.ceil(s)} 秒`:`${Math.floor(s/60)} 分 ${Math.ceil(s%60)} 秒`;
    const elapsed=(task,progress)=>Math.max(progress?.elapsed_seconds||0,(Date.now()-new Date(task.created_at).getTime())/1000,0);
    async function api(url,opts={}){const controller=new AbortController(),timer=setTimeout(()=>controller.abort(),15000);try{const r=await fetch(url,{...opts,signal:controller.signal,cache:'no-store'}),d=await r.json();if(!r.ok)throw Error(d.error||'请求失败');return d}finally{clearTimeout(timer)}}
    async function load(){try{overview=await api('/api/overview');render();if(selected)showDate(selected)}catch(e){const message=e.name==='AbortError'?'接口 15 秒未响应。请打开 /api/health 检查容器状态，或查看容器日志。':e.message;$('#mission').className='mission empty';$('#mission').innerHTML=`<div><b>录像索引暂未响应</b><div class="progress"><i style="width:0%"></i></div><small>${message}</small></div><div class="metric">!<small>API TIMEOUT</small></div>`;$('#details').innerHTML=`<div class="empty">读取录像索引失败：${message}</div>`}}
    function active(){return overview.tasks.find(t=>t.status==='running')}
    function render(){const run=active(),p=run?.progress||{},phase=p.phase==='exporting'?'正在合成延时视频':p.phase==='starting'?'正在准备扫描':'正在扫描人物',d=overview.diagnostics||{},visible=overview.dates.slice(0,60),source=overview.indexing?`${d.message||'正在后台建立录像索引…'} 页面会自动刷新。`:d.available?`容器看到 ${d.mp4_files||0} 个 MP4，其中 ${d.recognized_files||0} 个文件名可识别。`:`${d.message||'录像源诊断尚未返回'}`;$('#mission').className='mission'+(run?'':' empty');$('#mission').innerHTML=run?`<div><b>${phase} · ${fmt(run.date)}${run.camera?' · '+run.camera+'路':''}</b><div class="progress"><i style="width:${p.percent||0}%"></i></div><small>${p.current_file||'正在准备文件…'}<br>文件 ${p.file_index||0}/${p.total_files||'?'} · 抽帧 ${p.samples||p.frames||0}/${p.estimated_samples||'?'} · YOLO ${p.yolo_inferences||0} 次 · ETA ${time(p.eta_seconds)}</small></div><div class="metric">${p.percent??0}%<small id="elapsed">${time(elapsed(run,p))} 已运行</small></div>`:`<div><b>${overview.indexing?'正在建立录像索引':'等待你的第一项指令'}</b><div class="progress"><i style="width:${overview.indexing?35:0}%"></i></div><small>${source}</small></div><div class="metric">${overview.indexing?'…':'—'}<small>${overview.indexing?'INDEXING':'NO ACTIVE TASK'}</small></div>`;$('#dateCount').textContent=overview.dates.length?`· 最近 60 / 共 ${overview.dates.length} 天`:'';$('#dates').innerHTML=visible.map(d=>`<button class="date ${d.date===selected?'active':''}" data-date="${d.date}"><strong>${fmt(d.date)}</strong><small>${d.ready?`${d.events} 个事件 · ${d.cameras.join('/')} 路`:'待扫描'}</small></button>`).join('')||`<div class="empty">${overview.indexing?'正在读取历史录像日期，完成后会自动显示。':`未建立日期索引。${source}`}</div>`;if(!$('#dateSelect').value&&overview.dates[0])$('#dateSelect').value=inputDate(overview.dates[0].date);$('#tasks').innerHTML=overview.tasks.map(t=>{const q=t.progress||{};return `<div class="task"><b>${t.kind==='scan'?'人物扫描':'延时导出'} · ${fmt(t.date)}${t.camera?' · '+t.camera+'路':''}</b>${t.status==='running'?`<button class="cancel" data-cancel="${t.id}">取消</button>`:''}<br><span class="tag ${t.status}">${t.status}</span> <small>${t.created_at}</small>${t.status==='running'?`<div class="mini"><span>${q.current_file||'准备中'}</span><span>${q.percent??0}%</span></div>`:''}</div>`}).join('')||'<div class="empty">尚无任务</div>';document.querySelectorAll('[data-date]').forEach(x=>x.onclick=()=>showDate(x.dataset.date));document.querySelectorAll('[data-cancel]').forEach(x=>x.onclick=()=>cancel(x.dataset.cancel));$('#scan').disabled=!!run||overview.indexing;$('#export').disabled=!!run||overview.indexing}
    async function showDate(date){selected=date;$('#dateSelect').value=inputDate(date);render();const data=await api('/api/date/'+date);const groups=data.events.events||{};const events=Object.entries(groups).flatMap(([camera,list])=>list.map(e=>({...e,camera})));const clips=data.exports.map(name=>`<video controls preload="metadata" src="/media/${encodeURIComponent(name)}"></video><small>${name}</small>`).join('');$('#details').innerHTML=`<h2>${fmt(date)} · 人物事件 ${events.length} 段</h2>${clips||''}<div>${events.map(e=>`<div class="event"><img src="/media/${e.thumbnail}" alt="事件缩略图"><div><b>${e.camera} 路 · ${e.start.slice(11)} — ${e.end.slice(11)}</b><br><small>检测命中 ${e.hits} 次</small></div></div>`).join('')||'<div class="empty">尚未扫描或没有检测到人物</div>'}</div>`}
    async function task(kind){try{const date=$('#dateSelect').value.replaceAll('-',''),end_date=$('#endDate').value.replaceAll('-','');if(!date)throw Error('请选择开始日期');if(kind==='scan'&&end_date&&end_date!==date)throw Error('扫描请按天入队；可连续添加多个日期。');$('#notice').textContent='正在创建任务…';await api('/api/tasks',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({kind,date,end_date,camera:$('#cameraSelect').value,profile:$('#profile').value})});$('#notice').textContent='已加入队列，系统会按顺序执行。';await load()}catch(e){$('#notice').textContent=e.message}}
    async function cancel(id){if(!confirm('确定停止当前任务吗？已完成的结果会保留。'))return;try{await api('/api/tasks/'+id,{method:'DELETE'});$('#notice').textContent='正在停止任务…';await load()}catch(e){$('#notice').textContent=e.message}}
    $('#scan').onclick=()=>task('scan');$('#export').onclick=()=>task('export');$('#dateSelect').onchange=()=>{const date=$('#dateSelect').value.replaceAll('-','');if(date)showDate(date)};setInterval(load,5000);load();setInterval(()=>{const run=active();if(run&&$('#elapsed'))$('#elapsed').textContent=`${time(elapsed(run,run.progress))} 已运行`;$('#clock').textContent=new Date().toLocaleString('zh-CN',{hour12:false})},1000);
  </script>
  <script>setInterval(()=>{document.querySelector('#scan').disabled=false;document.querySelector('#export').disabled=false},500)</script>
</body>
</html>
