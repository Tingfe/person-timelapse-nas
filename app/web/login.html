<!doctype html>
<html lang="zh-CN"><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>影像档案室 · 登录</title>
<style>:root{--ink:#1d2926;--moss:#28604d;--paper:#f5f1e8;--line:#c5c1b6}*{box-sizing:border-box}body{min-height:100vh;margin:0;display:grid;place-items:center;background:radial-gradient(#315047 .7px,transparent .8px),var(--paper);background-size:8px 8px;color:var(--ink);font:16px "Avenir Next","PingFang SC",sans-serif}.card{width:min(420px,calc(100vw - 40px));padding:38px;background:#fffdf7;border:1px solid var(--line);box-shadow:10px 12px 0 rgba(40,96,77,.18)}.eyebrow{color:var(--moss);font-size:12px;font-weight:800;letter-spacing:.15em}h1{margin:10px 0 26px;font:700 38px "Iowan Old Style","Songti SC",serif}label{display:grid;gap:8px;font-size:13px;font-weight:700}input{padding:13px;border:1px solid var(--line);font:inherit}button{width:100%;margin-top:20px;padding:13px;border:0;background:var(--moss);color:white;font:700 16px inherit;cursor:pointer}#error{min-height:22px;margin:12px 0 0;color:#bb3c25;font-size:13px}small{display:block;margin-top:24px;color:#68716c}</style>
<main class="card"><div class="eyebrow">PRIVATE ARCHIVE · LOCAL NETWORK</div><h1>影像档案室</h1><form id="login"><label>访问密码<input id="password" type="password" autocomplete="current-password" autofocus required></label><button>进入档案室</button><div id="error"></div></form><small>此服务仅供受信任的家庭局域网使用。</small></main>
<script>document.querySelector('#login').onsubmit=async e=>{e.preventDefault();const r=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:document.querySelector('#password').value})});if(r.ok)location.href='/';else document.querySelector('#error').textContent=(await r.json()).error||'登录失败'}</script>
</html>
