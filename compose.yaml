services:
  person-timelapse:
    # Change IMAGE only when using a fork or a pinned release tag.
    image: ${IMAGE:-tingfe/person-timelapse-nas:latest}
    container_name: person-timelapse
    working_dir: /app
    command: ["python", "/app/web_server.py"]
    volumes:
      - /你的/小米录像目录:/input:ro
      - /你的/人物延时输出目录:/output
      - ./models:/models
    ports:
      - "8790:8790"
    restart: unless-stopped
